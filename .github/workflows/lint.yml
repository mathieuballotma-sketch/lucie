name: lint

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  ruff:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install ruff
        run: |
          python -m pip install --upgrade pip
          pip install ruff

      - name: Ruff check
        run: ruff check .

      - name: Ruff format check
        run: ruff format --check .

      - name: Ruff blind-except check (scope = audit-2026-05-12 P0 files)
        # Scope étroit volontaire : 33 violations BLE résiduelles existent
        # ailleurs dans lucie_v1_standalone/ (pipeline.py, dossier_analyzer.py,
        # tests adversariaux, vendor legi). Cette étape protège exactement les
        # 3 fichiers audités le 2026-05-12 (verificateur, retriever,
        # ollama_provider) pour empêcher toute régression où l'on a payé le fix.
        # Le scope sera élargi progressivement à mesure que la dette BLE est
        # remboursée fichier par fichier.
        run: |
          ruff check --select BLE \
            lucie_v1_standalone/verificateur.py \
            lucie_v1_standalone/retriever.py \
            lucie_v1_standalone/llm/ollama_provider.py
