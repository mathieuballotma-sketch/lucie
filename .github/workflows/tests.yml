name: tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  pytest:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install runtime + test deps
        run: |
          python -m pip install --upgrade pip
          # requirements-public is the slim subset that works without
          # Ollama, the Légifrance SQLite, or proprietary credentials.
          pip install -r requirements-public.txt
          pip install pytest pytest-asyncio

      - name: Run unit tests (no Ollama, no Légifrance index)
        # Skip suites that require a running Ollama instance or the
        # local Légifrance index — both are out of scope for CI.
        run: |
          pytest tests/ -v \
            --ignore=tests/integration \
            --ignore=tests/llm \
            --ignore=tests/test_legifrance \
            -k "not integration and not requires_ollama"
