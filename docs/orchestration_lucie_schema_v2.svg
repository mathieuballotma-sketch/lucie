  <text x="1220" y="702" text-anchor="middle" font-size="13" fill="#0a66ff" font-weight="600">primée « architecte vérité »</text>
  <text x="1220" y="722" text-anchor="middle" font-size="11" fill="#666" font-style="italic">(texte d'intention,</text>
  <text x="1220" y="738" text-anchor="middle" font-size="11" fill="#666" font-style="italic">pas d'implémentation</text>
  <text x="1220" y="754" text-anchor="middle" font-size="11" fill="#666" font-style="italic">vérifiée)</text>
