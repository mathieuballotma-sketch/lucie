  <rect x="400" y="655" width="240" height="190" rx="10" fill="#fff" stroke="#444" stroke-width="2"/>
  <text x="520" y="682" text-anchor="middle" font-size="15" font-weight="700" fill="#111">Session Claude Code 2</text>
  <text x="520" y="702" text-anchor="middle" font-size="13" fill="#0a66ff" font-weight="600">primée « ingé sécurité »</text>
  <text x="520" y="722" text-anchor="middle" font-size="11" fill="#666" font-style="italic">(patch proposé, pas patch</text>
  <text x="520" y="738" text-anchor="middle" font-size="11" fill="#666" font-style="italic">certifié — revue humaine</text>
  <text x="520" y="754" text-anchor="middle" font-size="11" fill="#666" font-style="italic">requise)</text>
  <text x="520" y="780" text-anchor="middle" font-size="12" fill="#333">Mission : patch 2 RCE</text>
  <text x="520" y="815" text-anchor="middle" font-size="12" font-weight="600" fill="#d97706">⏳ en cours</text>

  <!-- Worker 3 -->
  <rect x="760" y="655" width="240" height="190" rx="10" fill="#fff" stroke="#444" stroke-width="2"/>
  <text x="880" y="682" text-anchor="middle" font-size="15" font-weight="700" fill="#111">Session Claude Code 3</text>
  <text x="880" y="702" text-anchor="middle" font-size="13" fill="#0a66ff" font-weight="600">primée « staff bench ML »</text>
  <text x="880" y="722" text-anchor="middle" font-size="11" fill="#1a8a4a" font-style="italic">(ollama run = vraie exécution</text>
  <text x="880" y="738" text-anchor="middle" font-size="11" fill="#1a8a4a" font-style="italic">sur ton GPU, chiffres réels</text>
  <text x="880" y="754" text-anchor="middle" font-size="11" fill="#1a8a4a" font-style="italic">lus depuis stdout)</text>
  <text x="880" y="780" text-anchor="middle" font-size="12" fill="#333">Mission : bench Gemma 4</text>
  <text x="880" y="815" text-anchor="middle" font-size="12" font-weight="600" fill="#d97706">⏳ en cours</text>

  <!-- Worker 4 -->
  <rect x="1100" y="655" width="240" height="190" rx="10" fill="#fff" stroke="#444" stroke-width="2"/>
