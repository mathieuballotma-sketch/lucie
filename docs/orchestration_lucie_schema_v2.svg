  <text x="1220" y="815" text-anchor="middle" font-size="12" font-weight="600" fill="#1a8a4a">✅ texte produit</text>

  <!-- Worktrees -->
  <rect x="110" y="880" width="1180" height="155" rx="10" fill="#fff" stroke="#666" stroke-width="1.5"/>
  <text x="130" y="908" font-size="14" font-weight="700" fill="#111">📁 /Users/mathieu/Desktop/mon-agence-ia/.claude/worktrees/</text>
  <text x="130" y="926" font-size="11" fill="#555">clones git isolés — git worktree add</text>

  <text x="130" y="955" font-size="12" fill="#c0392b" font-weight="600">⚠ Isolation git seulement : pas d'isolation système (dépendances Python, ports, processus).</text>
  <text x="130" y="973" font-size="12" fill="#c0392b" font-weight="600">⚠ Deux ouvriers peuvent se marcher dessus sur les dépendances ou l'environnement Python.</text>

  <text x="130" y="1000" font-size="11" fill="#333">quirky-hoover/ (bench) • adoring-taussig/ (fix RCE) • tender-kepler/ (Phase A) • hardcore-wu/ (Phase B)</text>
  <text x="130" y="1018" font-size="11" fill="#666" font-style="italic">Les merges vers main restent à ta charge — git handle la plupart, toi les conflits sémantiques.</text>

  <!-- Deliverables -->
  <rect x="110" y="1055" width="1180" height="210" rx="10" fill="#fff" stroke="#666" stroke-width="1.5"/>
  <text x="130" y="1082" font-size="14" font-weight="700" fill="#111">📚 /Users/mathieu/Documents/Lucie/Suivi Lucie/ — livrables écrits</text>

  <text x="140" y="1112" font-size="12" fill="#1a8a4a">✅</text>
  <text x="165" y="1112" font-size="12" fill="#111">17_Vision_Verifiable_Lucie.md</text>
  <text x="465" y="1112" font-size="11" fill="#c0392b">— 96 assertions <u>analysées</u> (pas vérifiées externement), 8 contradictions flagées</text>

  <text x="140" y="1135" font-size="12" fill="#1a8a4a">✅</text>
  <text x="165" y="1135" font-size="12" fill="#111">15_Audit_Etat_Code_Lucie.md</text>
  <text x="465" y="1135" font-size="11" fill="#666">— inventaire du code réel (grep + lecture, pas exécution)</text>

  <text x="140" y="1158" font-size="12" fill="#1a8a4a">✅</text>
  <text x="165" y="1158" font-size="12" fill="#111">18_Verite_Comme_Axiome_de_Conception.md</text>
  <text x="465" y="1158" font-size="11" fill="#666">— texte de principe, pas de code</text>

  <text x="140" y="1181" font-size="12" fill="#1a8a4a">✅</text>
  <text x="165" y="1181" font-size="12" fill="#111">19_Lucie_v1_Aout_2026_Specification.md</text>
  <text x="465" y="1181" font-size="11" fill="#d97706">— en attente d'audit vérité, non validé</text>

  <text x="140" y="1204" font-size="12" fill="#d97706">⏳</text>
  <text x="165" y="1204" font-size="12" fill="#111">20_Bench_Gemma4_Lucie_v1.md</text>
  <text x="465" y="1204" font-size="11" fill="#1a8a4a">— mesures réelles sur ton hardware (ollama run)</text>

  <text x="140" y="1227" font-size="12" fill="#d97706">⏳</text>
  <text x="165" y="1227" font-size="12" fill="#111">21_Audit_Securite_RCE_Fix_2026-04-10.md</text>
  <text x="465" y="1227" font-size="11" fill="#c0392b">— patch proposé, doit passer bandit/semgrep + ta revue</text>

  <text x="130" y="1253" font-size="11" fill="#c0392b" font-style="italic">Aucun de ces livrables n'est validé tant que l'audit vérité + validation humaine ne sont pas passés.</text>

  <!-- Audit -->
  <line x1="700" y1="1275" x2="700" y2="1315" stroke="#1a8a4a" stroke-width="3" marker-end="url(#arrowGreen)"/>

  <rect x="250" y="1320" width="900" height="130" rx="12" fill="#e8ffe8" stroke="#1a8a4a" stroke-width="3"/>
  <text x="700" y="1352" text-anchor="middle" font-size="18" font-weight="700" fill="#1a8a4a">🔍 AUDIT VÉRITÉ (premier filtre — pas le dernier)</text>
  <text x="700" y="1377" text-anchor="middle" font-size="12" fill="#222">Je relis chaque livrable en cherchant contradictions internes, stubs déguisés, promesses vides, mots qui surjouent.</text>
  <text x="700" y="1397" text-anchor="middle" font-size="12" fill="#c0392b" font-weight="600">⚠ Ce que l'audit LLM NE détecte PAS : hallucinations subtiles (numéro d'article faux, chiffre inventé plausible).</text>
  <text x="700" y="1417" text-anchor="middle" font-size="12" fill="#222">Pour ça il faut des vérifs externes : tests, Légifrance, bandit/semgrep, relecture humaine.</text>
  <text x="700" y="1438" text-anchor="middle" font-size="11" fill="#555" font-style="italic">L'audit bloque ou retourne au worker pour correction. Boucle de reprise = send_message avec la correction demandée.</text>

  <!-- External verification -->
  <line x1="700" y1="1460" x2="700" y2="1500" stroke="#c0392b" stroke-width="3" marker-end="url(#arrowRed)"/>

  <rect x="250" y="1505" width="900" height="130" rx="12" fill="#fff0f0" stroke="#c0392b" stroke-width="3"/>
  <text x="700" y="1537" text-anchor="middle" font-size="18" font-weight="700" fill="#c0392b">🛡  VÉRIFICATION EXTERNE (non optionnelle — règle 19)</text>
  <text x="700" y="1562" text-anchor="middle" font-size="12" fill="#222">Chaque affirmation technique est confrontée à une source externe déterministe :</text>
  <text x="700" y="1582" text-anchor="middle" font-size="12" fill="#222">• code RCE → bandit + semgrep + tests  • bench → mesures ollama réelles  • assertions juridiques → Légifrance/sources</text>
  <text x="700" y="1602" text-anchor="middle" font-size="12" fill="#222">• refs croisées → grep dans le code  • promesses de features → recherche dans le code pour vérifier existence</text>
  <text x="700" y="1623" text-anchor="middle" font-size="11" fill="#555" font-style="italic">Sans cette étape, l'audit vérité reste un filet à gros trous. C'est là qu'on tue les hallucinations subtiles.</text>

  <!-- Human review -->
  <line x1="700" y1="1650" x2="700" y2="1690" stroke="#111" stroke-width="3" marker-end="url(#arrow)"/>

  <rect x="300" y="1695" width="800" height="110" rx="12" fill="#fff3cd" stroke="#b8860b" stroke-width="3"/>
  <text x="700" y="1727" text-anchor="middle" font-size="18" font-weight="700" fill="#111">👤 VALIDATION HUMAINE MATHIEU</text>
  <text x="700" y="1753" text-anchor="middle" font-size="12" fill="#222">Je te signale explicitement les zones de faible confiance, pour que tu saches où relire en profondeur.</text>
  <text x="700" y="1772" text-anchor="middle" font-size="12" fill="#222">Tu n'as pas à tout relire — tu relis en priorité : patch sécurité, affirmations techniques critiques, décisions irréversibles.</text>
  <text x="700" y="1792" text-anchor="middle" font-size="11" fill="#c0392b" font-weight="600">Tu es le dernier filet. Si tu valides trop vite, la règle d'or est cassée.</text>

  <!-- Legend -->
  <rect x="60" y="1840" width="1280" height="180" rx="10" fill="#f0f0f0" stroke="#666" stroke-width="1.5"/>
  <text x="80" y="1870" font-size="14" font-weight="700" fill="#111">Zones de faiblesse assumées (règle 15)</text>

  <text x="80" y="1898" font-size="12" fill="#c0392b">•</text>
  <text x="100" y="1898" font-size="12" fill="#222">Role priming ≠ vraie expertise. Les agents sont primés pour jouer un rôle, pas pour l'être. Concentration probabiliste, pas équivalence humaine.</text>

  <text x="80" y="1918" font-size="12" fill="#c0392b">•</text>
  <text x="100" y="1918" font-size="12" fill="#222">Worktrees isolent le git, pas l'OS. Deux ouvriers peuvent casser un environnement partagé si on n'y prend pas garde.</text>

  <text x="80" y="1938" font-size="12" fill="#c0392b">•</text>
  <text x="100" y="1938" font-size="12" fill="#222">Patch RCE produit par un LLM = proposition, pas certification. bandit/semgrep + relecture humaine sont obligatoires avant merge.</text>

  <text x="80" y="1958" font-size="12" fill="#c0392b">•</text>
  <text x="100" y="1958" font-size="12" fill="#222">Audit LLM-sur-LLM attrape les contradictions grossières, pas les hallucinations subtiles. La vérification externe est obligatoire.</text>

  <text x="80" y="1978" font-size="12" fill="#c0392b">•</text>
  <text x="100" y="1978" font-size="12" fill="#222">La validation humaine finale ne peut pas être esquivée. Moi + mes agents sommes faillibles, toi es le filet de dernier recours.</text>

  <text x="80" y="2005" font-size="11" fill="#1a8a4a" font-style="italic">Reconnaître ces faiblesses explicitement est une application directe de la règle d'or : mieux vaut un schéma honnête incomplet qu'un schéma beau qui ment.</text>
</svg>
