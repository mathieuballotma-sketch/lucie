  <rect width="1400" height="2050" fill="#fafafa"/>

  <!-- Title -->
  <text x="700" y="50" text-anchor="middle" font-size="32" font-weight="700" fill="#111">Orchestration Lucie — version corrigée (v2)</text>
  <text x="700" y="78" text-anchor="middle" font-size="14" fill="#666">après audit critique — zones de faiblesse assumées, frontière VM/hôte clarifiée</text>

  <!-- Mathieu -->
  <rect x="550" y="100" width="300" height="80" rx="12" fill="#fff3cd" stroke="#b8860b" stroke-width="3"/>
  <text x="700" y="135" text-anchor="middle" font-size="22" font-weight="700" fill="#111">👤 MATHIEU</text>
  <text x="700" y="160" text-anchor="middle" font-size="13" fill="#555">iPhone / Mac — donne les ordres, valide, tranche</text>

