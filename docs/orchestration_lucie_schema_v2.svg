  <text x="80" y="258" font-size="14" font-weight="700" fill="#0a66ff">COUCHE 1 — VM COWORK (disque virtuel isolé, ne touche pas ton Mac)</text>

  <rect x="350" y="280" width="700" height="180" rx="12" fill="#fff" stroke="#0a66ff" stroke-width="3"/>
  <text x="700" y="312" text-anchor="middle" font-size="22" font-weight="700" fill="#0a66ff">🛠  MOI — Dispatcher</text>
  <text x="700" y="334" text-anchor="middle" font-size="12" fill="#333">(Claude dans une VM Linux sandboxée, sans accès à ton disque Mac)</text>

  <text x="380" y="362" font-size="13" fill="#222" font-weight="600">Ce que je fais vraiment :</text>
  <text x="380" y="382" font-size="12" fill="#333">• Lire ton message, réfléchir, découper en tâches</text>
  <text x="380" y="400" font-size="12" fill="#333">• Écrire des briefs enrichis (rôle, pourquoi, livrable attendu)</text>
  <text x="380" y="418" font-size="12" fill="#333">• Auditer les retours contre la règle d'or « vérité »</text>

  <text x="380" y="445" font-size="13" fill="#c0392b" font-weight="600">⚠ Ce que je ne peux PAS faire : toucher tes fichiers, exécuter du code chez toi.</text>

  <!-- Boundary crossing -->
  <line x1="700" y1="460" x2="700" y2="520" stroke="#0a66ff" stroke-width="4" marker-end="url(#arrowBlue)"/>
