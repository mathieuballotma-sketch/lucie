  <text x="180" y="702" text-anchor="middle" font-size="13" fill="#0a66ff" font-weight="600">primée « rédacteur CEO »</text>
  <text x="180" y="722" text-anchor="middle" font-size="11" fill="#666" font-style="italic">(role priming = réduction</text>
  <text x="180" y="738" text-anchor="middle" font-size="11" fill="#666" font-style="italic">de l'espace des réponses,</text>
  <text x="180" y="754" text-anchor="middle" font-size="11" fill="#666" font-style="italic">pas une vraie expertise)</text>
  <text x="180" y="780" text-anchor="middle" font-size="12" fill="#333">Mission : spec v1 août 2026</text>
  <text x="180" y="815" text-anchor="middle" font-size="12" font-weight="600" fill="#1a8a4a">✅ texte produit</text>

