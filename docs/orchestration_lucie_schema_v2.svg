  <!-- ====== LAYER 2 — MAC HÔTE ====== -->
  <rect x="50" y="540" width="1300" height="920" rx="14" fill="#f6f6f6" stroke="#111" stroke-width="2" stroke-dasharray="8,4"/>
  <text x="80" y="568" font-size="14" font-weight="700" fill="#111">COUCHE 2 — TON MAC (processus Claude Code réels, accès filesystem, exécution réelle)</text>

  <text x="700" y="595" text-anchor="middle" font-size="13" fill="#555" font-style="italic">Chaque session ci-dessous est un vrai processus Claude Code avec tool access — pas ma VM, pas une simulation.</text>

  <!-- Branch arrows -->
  <line x1="700" y1="610" x2="180" y2="645" stroke="#0a66ff" stroke-width="2.5" marker-end="url(#arrowBlue)"/>
  <line x1="700" y1="610" x2="520" y2="645" stroke="#0a66ff" stroke-width="2.5" marker-end="url(#arrowBlue)"/>
  <line x1="700" y1="610" x2="880" y2="645" stroke="#0a66ff" stroke-width="2.5" marker-end="url(#arrowBlue)"/>
  <line x1="700" y1="610" x2="1220" y2="645" stroke="#0a66ff" stroke-width="2.5" marker-end="url(#arrowBlue)"/>

  <!-- Worker 1 -->
  <rect x="60" y="655" width="240" height="190" rx="10" fill="#fff" stroke="#444" stroke-width="2"/>
