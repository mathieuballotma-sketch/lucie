<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 640" width="1280" height="640" role="img" aria-label="Beaume — local AI for French lawyers — Swiss-watch grade">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#0f1d33"/>
      <stop offset="100%" stop-color="#1a365d"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#b8860b" stop-opacity="0"/>
      <stop offset="50%" stop-color="#b8860b" stop-opacity="0.7"/>
      <stop offset="100%" stop-color="#b8860b" stop-opacity="0"/>
    </linearGradient>
  </defs>

  <rect width="1280" height="640" fill="url(#bg)"/>

  <!-- subtle horizontal accent line near vertical midpoint -->
  <rect x="0" y="320" width="1280" height="1" fill="url(#accent)"/>

  <!-- Product name, serif typography -->
  <text x="640" y="296" text-anchor="middle"
        font-family="Georgia, 'Times New Roman', serif"
        font-size="120" font-weight="400" fill="#f5f1e8"
        letter-spacing="6">
    Beaume
  </text>

  <!-- Tagline, sans-serif, restrained -->
  <text x="640" y="376" text-anchor="middle"
        font-family="Helvetica, Arial, sans-serif"
        font-size="22" font-weight="300" fill="#c8d3e4"
        letter-spacing="3">
    LOCAL AI FOR FRENCH LAWYERS
  </text>

  <!-- Sub-tagline, italic serif, golden -->
  <text x="640" y="416" text-anchor="middle"
        font-family="Georgia, serif"
        font-size="18" font-style="italic" fill="#b8860b"
        letter-spacing="2">
    Swiss-watch grade · 100% on-device · Truth rule absolute
  </text>

  <!-- bottom-left meta, very small -->
  <text x="40" y="600"
        font-family="Helvetica, Arial, sans-serif"
        font-size="11" font-weight="300" fill="#6c7a93"
        letter-spacing="1">
    droit social · v1 alpha · mai 2026
  </text>

  <!-- bottom-right meta -->
  <text x="1240" y="600" text-anchor="end"
        font-family="Helvetica, Arial, sans-serif"
        font-size="11" font-weight="300" fill="#6c7a93"
        letter-spacing="1">
    bellot · solo bootstrap
  </text>
</svg>
