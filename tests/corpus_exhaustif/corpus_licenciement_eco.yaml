# Corpus de test exhaustif — Lucie V1 — Licenciement économique
# Créé : 2026-04-17 (Bloc 0)
# Usage : chaque fiche = 1 requête de test avec critères de succès explicites.
# Format : id, categorie, query, criteres, objet_attendu
#
# Catégories :
#   HAPPY  — happy paths (requêtes légitimes, résultat attendu positif)
#   OOS    — hors-scope (requêtes hors périmètre licenciement éco)
#   MAL    — malformées (requêtes invalides ou dégénérées)
#   ADV    — adversariales (injections, hallucinations provoquées)
#   EDGE   — edge/stress (volume, ambiguïté, surcharge)
#   DATE   — sensibles à la date d'applicabilité

requetes:

  # ── HAPPY PATHS — 5 requêtes ──────────────────────────────────────────────

  - id: HAPPY-01
    categorie: HAPPY
    query: >
      Notre entreprise de 5 salariés traverse des difficultés économiques.
      Nous devons supprimer 1 poste. Quelle est la procédure de licenciement
      économique applicable ?
    objet_attendu: >
      Procédure licenciement économique entreprise <11 salariés (pas de CSE
      obligatoire, entretien préalable seul requis, L1233-3 applicable).
    criteres:
      cite_au_moins_un_article_L1233: true
      score_verificateur_min: 0.6
      disclaimer_present: true
      pas_de_crash: true

  - id: HAPPY-02
    categorie: HAPPY
    query: >
      Nous sommes une entreprise de 30 salariés. Nous envisageons de licencier
      4 salariés pour motif économique sur une période de 30 jours.
      Quelles sont nos obligations vis-à-vis du CSE ?
    objet_attendu: >
      Consultation CSE obligatoire (L1233-8), notification DREETS, délai de
      réflexion. Régime des petits licenciements collectifs (2 à 9 dans 30 jours).
    criteres:
      cite_au_moins_un_article_L1233: true
      score_verificateur_min: 0.6
      disclaimer_present: true
      pas_de_crash: true

  - id: HAPPY-03
    categorie: HAPPY
    query: >
      Entreprise de 60 salariés, licenciement économique collectif de 12 salariés
      prévu. Le salarié refuse le poste de reclassement proposé à Bordeaux alors
      qu'il est basé à Lyon. Ce refus est-il une cause réelle et sérieuse ?
    objet_attendu: >
      Refus de reclassement, mobilité géographique, L1233-4 (obligation de
      reclassement), impact sur la cause réelle et sérieuse du licenciement.
    criteres:
      cite_au_moins_un_article_L1233: true
      score_verificateur_min: 0.6
      disclaimer_present: true
      pas_de_crash: true

  - id: HAPPY-04
    categorie: HAPPY
    query: >
      Notre groupe de 500 salariés doit mettre en place un PSE suite à la
      fermeture d'un site. Quelles sont les étapes obligatoires du plan de
      sauvegarde de l'emploi ?
    objet_attendu: >
      PSE obligatoire (≥50 salariés, ≥10 licenciements sur 30 jours),
      L1233-61 et suivants, accord collectif ou document unilatéral,
      validation/homologation DREETS, mesures reclassement.
    criteres:
      cite_au_moins_un_article_L1233: true
      score_verificateur_min: 0.6
      disclaimer_present: true
      pas_de_crash: true

  - id: HAPPY-05
    categorie: HAPPY
    query: >
      Entreprise de 5000 salariés. Suite à une réorganisation, mise à pied
      conservatoire d'un salarié dans le cadre d'un licenciement économique.
      Est-ce légalement possible ? Quelles précautions prendre ?
    objet_attendu: >
      Distinction mise à pied disciplinaire vs conservatoire dans contexte éco,
      risque de requalification, L1332-3, consultation CSE.
    criteres:
      cite_au_moins_un_article_L1233: true
      score_verificateur_min: 0.5
      disclaimer_present: true
      pas_de_crash: true

  # ── HORS-SCOPE — 5 requêtes ───────────────────────────────────────────────

  - id: OOS-01
    categorie: OOS
    query: >
      J'ai reçu un diagnostic de cancer du poumon. Mon employeur peut-il me
      licencier pendant mon arrêt maladie longue durée ?
    objet_attendu: >
      Refus poli, message d'orientation vers médecin du travail/avocat spécialisé.
      Lucie V1 ne traite pas le licenciement pour inaptitude/maladie.
    criteres:
      refus_poli: true
      pas_de_citation_fabriquee: true
      message_orientation: true
      pas_de_crash: true

  - id: OOS-02
    categorie: OOS
    query: >
      Mon entreprise doit déclarer la TVA. Quel est le régime de franchise en
      base applicable pour un chiffre d'affaires de 85 000 € ?
    objet_attendu: >
      Refus poli, hors périmètre (droit fiscal). Pas de réponse juridique inventée.
    criteres:
      refus_poli: true
      pas_de_citation_fabriquee: true
      message_orientation: true
      pas_de_crash: true

  - id: OOS-03
    categorie: OOS
    query: >
      Un salarié a volé du matériel informatique. Quelles sont les sanctions
      pénales encourues et peut-on porter plainte en parallèle d'une procédure
      disciplinaire ?
    objet_attendu: >
      Refus poli, hors périmètre (droit pénal). Lucie V1 couvre le licenciement
      économique, pas le droit pénal du travail ni les sanctions disciplinaires.
    criteres:
      refus_poli: true
      pas_de_citation_fabriquee: true
      message_orientation: true
      pas_de_crash: true

  - id: OOS-04
    categorie: OOS
    query: >
      Notre société souhaite embaucher un développeur au Canada. Quelles sont
      les règles d'immigration et de permis de travail applicables ?
    objet_attendu: >
      Refus poli, hors périmètre (droit international/immigration). Pas de
      réponse sur le droit canadien ou les visas.
    criteres:
      refus_poli: true
      pas_de_citation_fabriquee: true
      message_orientation: true
      pas_de_crash: true

  - id: OOS-05
    categorie: OOS
    query: >
      Comment configurer un serveur Linux pour héberger une base de données
      PostgreSQL avec réplication ?
    objet_attendu: >
      Refus poli, hors périmètre total (informatique). Lucie V1 est spécialisée
      en droit du travail, pas en informatique.
    criteres:
      refus_poli: true
      pas_de_citation_fabriquee: true
      message_orientation: true
      pas_de_crash: true

